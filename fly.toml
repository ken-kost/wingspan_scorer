# fly.toml app configuration file generated for wingspan-scorer on 2026-03-02T19:21:04+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wingspan-scorer'
primary_region = 'fra'
kill_signal = 'SIGTERM'

[build]

[deploy]

[mounts]
  source = 'mnesia_data'
  destination = '/data'

[env]
  PHX_HOST = 'wingspan-scorer.fly.dev'
  PORT = '8080'
  MNESIA_DIR = '/data/mnesia'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
